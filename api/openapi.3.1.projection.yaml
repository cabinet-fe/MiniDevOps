      responses: {"200": {description: OK}}
  /ai/runs/{id}:
    parameters: [{$ref: "#/components/parameters/ID"}]
    get:
      tags: [Agents]
      summary: Get AgentRun detail
      operationId: aiRunsGet
      responses: {"200": {description: OK}}
  /ai/runs/{id}/cancel:
    parameters: [{$ref: "#/components/parameters/ID"}]
    post:
      tags: [Agents]
      summary: Cancel AgentRun
      operationId: aiRunsCancel
      responses: {"200": {description: Cancelled}}
  /skills:
    get:
      tags: [Skills]
      summary: List Skill packages
      description: public skills visible with view permission; private only to creator.
      operationId: skillsList
      parameters:
        - {$ref: "#/components/parameters/Page"}
        - {$ref: "#/components/parameters/PageSize"}
      responses: {"200": {description: OK}}
    post:
      tags: [Skills]
      summary: Upload Skill ZIP
      description: Requires SKILL.md; Zip Slip / zip bomb protected; default max 50MB via StorageService.
      operationId: skillsCreate
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                name: {type: string}
                description: {type: string}
                visibility: {type: string, enum: [public, private]}
                file: {type: string, format: binary}
      responses:
        "201": {description: Created}
        "422": {description: Missing SKILL.md}
  /skills/{id}:
    parameters: [{$ref: "#/components/parameters/ID"}]
    get:
      tags: [Skills]
      summary: Get Skill metadata
      operationId: skillsGet
      responses: {"200": {description: OK}}
    put:
      tags: [Skills]
      summary: Overwrite Skill package (no version history)
      operationId: skillsOverwrite
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                name: {type: string}
                description: {type: string}
                visibility: {type: string, enum: [public, private]}
                file: {type: string, format: binary}
      responses: {"200": {description: Updated}}
    delete:
      tags: [Skills]
      summary: Delete Skill
      operationId: skillsDelete
      responses: {"200": {description: Deleted}}
  /skills/{id}/package:
    parameters: [{$ref: "#/components/parameters/ID"}]
    get:
      tags: [Skills]
      summary: Download Skill ZIP
      description: JWT with `ai.skills:download` or PAT scope `skills:read`.
      operationId: skillsDownload
      responses:
        "200":
          description: ZIP bytes
          content:
            application/zip:
              schema: {type: string, format: binary}
        "401": {$ref: "#/components/responses/Error"}
        "403": {$ref: "#/components/responses/Error"}
  /tokens:
    get:
      tags: [Tokens]
      summary: List personal access tokens (metadata only)
      operationId: tokensList
      responses: {"200": {description: OK}}
    post:
      tags: [Tokens]
      summary: Create PAT
      description: |
        Plaintext token is returned **once** in the create response and never again.
        Stored as hash. Scopes ⊆ {skills:read, agents:run}. Does not replace HTTPS/TLS.
      operationId: tokensCreate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, scopes]
              properties:
                name: {type: string}
                scopes:
                  type: array
                  items: {type: string, enum: ['skills:read', 'agents:run']}
                expires_at: {type: string, format: date-time, nullable: true}
      responses:
        "201":
          description: Created (includes plaintext once)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data: {$ref: "#/components/schemas/PATCreateResponse"}
  /tokens/{id}:
    parameters: [{$ref: "#/components/parameters/ID"}]
    delete:
      tags: [Tokens]
      summary: Revoke PAT
      operationId: tokensRevoke
      responses: {"200": {description: Revoked}}
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: "JWT or PAT"
      description: "Authorization Bearer accepts JWT access tokens or personal access tokens (prefix br_pat_)."
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: integer
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: page_size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    ID:
      name: id
      in: path
      required: true
      schema:
        type: integer
  responses:
    Error:
      description: Error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  schemas:
    SuccessEnvelope:
      type: object
      required: [code, message]
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: success
    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: integer
        message:
          type: string
        request_id:
          type: string
    LoginRequest:
      type: object
      required: [username]
      properties:
        username:
          type: string
        password_cipher:
          type: string
          description: hex(IV || AES-256-CBC PKCS#7 ciphertext); preferred for web-v2
        password:
          type: string
          description: Plaintext password for debug only; web-v2 must not send this
    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        display_name:
          type: string
        email:
          type: string
        avatar:
          type: string
        is_active:
          type: boolean
        is_super_admin:
          type: boolean
        role_ids:
          type: array
          items:
            type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    UserCreateRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
        display_name:
          type: string
        email:
          type: string
        is_active:
          type: boolean
        role_ids:
          type: array
          items:
            type: integer
    UserUpdateRequest:
      type: object
      properties:
        display_name:
          type: string
        email:
          type: string
        password:
          type: string
        is_active:
          type: boolean
        role_ids:
          type: array
          items:
            type: integer
    AccessTokenResponse:
      type: object
      required: [access_token]
      properties:
        access_token:
          type: string
    LoginResponse:
      type: object
      required: [access_token, user]
      properties:
        access_token:
          type: string
          description: JWT access token (Bearer); store client-side
        user:
          $ref: "#/components/schemas/User"
        permissions:
          type: array
          items:
            type: string
        menus:
          type: array
          items:
            $ref: "#/components/schemas/MenuNode"
      description: >
        refresh_token is delivered only via Set-Cookie (HttpOnly), not in JSON.

    MenuNode:
      type: object
      description: Trimmed menu for sidebar; map title/route/icon/children → NavItem (path ← route)
      properties:
        path:
          type: string
          description: Resource path (e.g. system.users)
        title:
          type: string
        route:
          type: string
          description: Frontend route used as NavItem.path
        icon:
          type: string
          description: Level-1 icon as data URL or Base64
        sort:
          type: integer
        children:
          type: array
          items:
            $ref: "#/components/schemas/MenuNode"
    MeResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        permissions:
          type: array
          items:
            type: string
        menus:
          type: array
          items:
            $ref: "#/components/schemas/MenuNode"
    Role:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        code:
          type: string
        description:
          type: string
        permissions:
          type: array
          items:
            $ref: "#/components/schemas/RolePermission"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    RolePermission:
      type: object
      properties:
        id:
          type: integer
        role_id:
          type: integer
        permission:
          type: string
    RoleCreateRequest:
      type: object
      required: [name, code]
      properties:
        name:
          type: string
        code:
          type: string
        description:
          type: string
        permissions:
          type: array
