            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          agent_run_id: {type: integer}
                          node_id: {type: integer}
        "400": {$ref: "#/components/responses/Error"}
        "501":
          description: AI domain bridge not wired
          content:
            application/json:
              schema: {$ref: "#/components/schemas/Error"}
