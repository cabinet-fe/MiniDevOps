name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2.2.0
      - name: Build frontend
        run: cd web && bun install && bun run build
      - uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: web/dist

  binaries:
    needs: frontend
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64.exe
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: cmd/server/dist
      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" \
            -o bedrock-${{ matrix.suffix }} ./cmd/server
          go build -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" \
            -o bedrock-agent-${{ matrix.suffix }} ./cmd/agent
      - uses: actions/upload-artifact@v7
        with:
          name: bedrock-${{ matrix.suffix }}
          path: |
            bedrock-${{ matrix.suffix }}
            bedrock-agent-${{ matrix.suffix }}

  publish:
    needs: binaries
    # softprops/action-gh-release 必须基于 tag；workflow_dispatch 走分支 ref 时跳过发版
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: bedrock-*
          merge-multiple: true
      - name: Create release
        uses: softprops/action-gh-release@v3.0.1
        with:
          generate_release_notes: true
          files: bedrock-*
          overwrite_files: true
