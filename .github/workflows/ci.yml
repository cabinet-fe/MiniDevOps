name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  openapi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: OpenAPI projection must be current (no hand-edits)
        run: make openapi-check

  guardrails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Ban supported 1.x→2.0 data migration paths
        run: bash scripts/check-ga-guardrails.sh

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2.2.0
      - name: Install vp
        run: bun add -g vite-plus
      - name: web-v2 check + build
        working-directory: web-v2
        run: |
          vp install
          vp check
          vp build

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Ensure embed dist exists
        run: |
          mkdir -p cmd/server/dist
          if [ ! -f cmd/server/dist/index.html ]; then
            printf '%s\n' '<!doctype html><html><head></head><body>ci placeholder</body></html>' > cmd/server/dist/index.html
          fi
      - name: Go test
        run: go test ./...
      - name: Go build (embed)
        run: make build-backend

  smoke-sqlite:
    runs-on: ubuntu-latest
    needs: [backend]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Ensure embed dist
        run: |
          mkdir -p cmd/server/dist
          if [ ! -f cmd/server/dist/index.html ]; then
            printf '%s\n' '<!doctype html><html><head></head><body>ci placeholder</body></html>' > cmd/server/dist/index.html
          fi
      - name: Fresh install + API smoke (SQLite)
        run: bash scripts/smoke/fresh-install.sh
